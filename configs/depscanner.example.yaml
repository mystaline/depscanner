# depscanner configuration
# Copy to ~/.depscanner.yaml and fill in your values.
#
# Environment variables are expanded inline — use ${VAR_NAME} syntax.
# Example: token: "${GITEA_TOKEN}"

gitea:
  url: "https://gitea.example.com"
  token: "${YOUR_GITEA_TOKEN}" # Token with read access to organization and repositories
  org: "my-org"

# Multi-org mode: replace gitea.org with gitea.orgs (per-org include/exclude are optional)
# gitea:
#   orgs:
#     - name: BETS-Global-Settings
#       include_repos:
#         - ts-global-settings
#     - name: BETS-Fixed-Asset
#       include_repos:
#         - fats
#         - fats-api-template
#       exclude_repos:
#         - fats-old

# Module path of the shared library to scan for.
target_module: "gitea.example.com/my-org/shared-lib"

# Local directory where repos are cloned/cached.
cache_dir: "~/.depscanner/repos"

# Branch to clone/track (default: main).
# default_branch: "main"

# Optional: scan only these repos (empty = all repos in org).
# include_repos:
#   - service-a
#   - service-b

# Branch tracking: repo branch -> target module branch.
# Used with --branch to detect staleness against the correct shared-lib branch.
# Default: dev->dev, staging->staging, main->main
# branch_tracking:
#   dev: dev
#   staging: staging
#   main: main

# Skip repos that are definitely not relevant Go services.
# Supports glob patterns: *, ?, [...]
exclude_repos:
  - docs
  # - "*-temp"       # exclude all repos ending in -temp
  # - "legacy-*"   # exclude all repos starting with legacy-

# --- Multi-source mode (Phase B) ---
# Declare N sources of truth and a consumer pool. Every consumer is scanned for
# calls to any source. Results are grouped by source and by org/group.
# Legacy `target_module` + `gitea.org(s)` above still works and is auto-mapped.
#
# sources:
#   - name: acme-lib
#     gitea: { url: https://gitea.example.com, token: ${GITEA_TOKEN}, org: org-a }
#     module: gitea.example.com/org-a/acme-lib   # optional; read from go.mod if omitted
#   - name: acme-core
#     path: ~/Workspace/.../acme-core           # local checkout, used in place
#
# consumers:
#   - gitea: { url: https://gitea.example.com, token: ${GITEA_TOKEN}, org: org-a }
#   - gitea: { url: https://gitea.example.com, token: ${GITEA_TOKEN}, org: org-b, exclude_repos: [docs] }
#   - path: ~/Workspace/.../some-service
#
# diff/impact select one source:  depscanner diff --source acme-lib <from> <to>
